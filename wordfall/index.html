<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wordfall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at center, hsl(190, 60%, 12%) 0%, hsl(190, 60%, 8%) 100%);
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Hidden input for typing */
    #typingInput {
      position: absolute;
      left: -9999px;
      top: 0;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    /* Overlay container */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .overlay-content {
      pointer-events: auto;
      text-align: center;
      padding: 2rem;
    }

    /* Start Screen */
    #startScreen {
      background: radial-gradient(circle at center, hsl(190, 60%, 12%) 0%, hsl(190, 60%, 8%) 100%);
      position: relative;
    }

    .start-bg-words {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .start-word {
      position: absolute;
      top: -100px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: clamp(1.2rem, 3vw, 2.5rem);
      color: rgba(255, 255, 255, 0.1);
      animation: fall linear infinite;
      white-space: nowrap;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .start-word.special {
      color: rgba(0, 161, 228, 0.3);
      background: rgba(0, 161, 228, 0.05);
      border-color: rgba(0, 161, 228, 0.15);
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(-10deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(calc(100vh + 100px)) rotate(10deg);
        opacity: 0;
      }
    }

    .game-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(3.5rem, 15vw, 7rem);
      font-weight: 800;
      color: #F6F9FB;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .game-title span {
      color: #00a1e4;
      text-shadow: 0 0 40px rgba(0, 161, 228, 0.4);
    }

    .game-subtitle {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: rgba(246, 249, 251, 0.6);
      margin-bottom: 3rem;
      max-width: 450px;
      line-height: 1.6;
      font-weight: 400;
    }

    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 1.25rem 3.5rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: #00a1e4;
      color: #121418;
      box-shadow: 0 0 0 0 rgba(0, 161, 228, 0);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      background: #00b4ff;
      box-shadow: 0 10px 25px -5px rgba(0, 161, 228, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(246, 249, 251, 0.05);
      color: #f6f9fb;
      border: 1px solid rgba(246, 249, 251, 0.1);
      margin-top: 0.5rem;
    }

    .btn-secondary:hover {
      background: rgba(246, 249, 251, 0.1);
      border-color: rgba(246, 249, 251, 0.2);
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 60px; /* Safe area handled by padding below */
      left: 0;
      right: 0;
      display: none;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 10px;
      z-index: 50;
      pointer-events: none;
    }

    .hud-badge {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
      max-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.02);
    }

    .hud-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(246, 249, 251, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }

    .hud-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: #f6f9fb;
    }

    /* Typing Buffer Display */
    #bufferDisplay {
      position: fixed;
      bottom: 50%; /* Default, will be overridden by JS on mobile */
      left: 50%;
      transform: translate(-50%, 0);
      z-index: 50;
      display: none;
    }

    .buffer-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 0.6rem 1.5rem;
      min-width: 240px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.02);
    }

    .buffer-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.1rem;
    }

    .buffer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: #00d4ff;
      min-height: 1.8rem;
      letter-spacing: 0.05em;
    }

    .buffer-cursor {
      display: inline-block;
      width: 2px;
      height: 1.5rem;
      background: #00d4ff;
      margin-left: 2px;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Freeze Overlay */
    #freezeOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0, 150, 255, 0.15) 0%, rgba(0, 100, 200, 0.3) 100%);
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #freezeOverlay.active {
      opacity: 1;
    }

    #freezeTimer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
      color: #00bfff;
      text-shadow: 0 0 30px rgba(0, 191, 255, 0.8);
      z-index: 41;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #freezeTimer.active {
      opacity: 1;
    }

    /* Game Over Screen */
    #gameOverScreen {
      background: #121418;
    }

    #gameOverScreen .overlay-content {
      margin-top: -180px;
    }

    .game-over-title {
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      font-weight: 800;
      color: #F6F9FB;
      margin-bottom: 2.5rem;
      letter-spacing: -0.03em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }

    .stat-item {
      background: rgba(246, 249, 251, 0.03);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid rgba(246, 249, 251, 0.08);
      text-align: left;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: rgba(246, 249, 251, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.75rem;
      font-weight: 700;
      color: #F6F9FB;
    }

    .stat-value.highlight {
      color: #00a1e4;
    }

    .buttons-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    /* Combo Display */
    #comboDisplay {
      position: fixed;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Outfit', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
      z-index: 45;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #comboDisplay.active {
      opacity: 1;
      animation: comboPop 0.4s ease-out;
    }

    #comboDisplay.tier-1 {
      font-size: 2.5rem;
      color: #ffd700;
    }

    #comboDisplay.tier-2 {
      font-size: 3.2rem;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
    }

    #comboDisplay.tier-3 {
      font-size: 4rem;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 50px rgba(0, 161, 228, 0.4);
    }

    @keyframes comboPop {
      0% { transform: translate(-50%, -50%) scale(0.5); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Mobile adjustments */
    @media (pointer: coarse) {
      #bufferDisplay {
        bottom: 1rem;
      }
      
      .buffer-container {
        min-width: 280px;
        padding: 1rem 1.5rem;
      }
      
      .buffer-text {
        font-size: 1.8rem;
      }

      #hud {
        padding: 0.75rem 1rem;
        padding-top: max(4rem, env(safe-area-inset-top));
      }

      .hud-badge {
        min-width: 70px;
        max-width: none;
        padding: 0.4rem 0.8rem;
        background: rgba(18, 20, 24, 0.95);
      }

      .hud-label {
        font-size: 0.6rem;
        margin-bottom: 0.1rem;
      }

      .hud-value {
        font-size: 1.4rem;
      }

      .game-subtitle {
        padding: 0 1rem;
      }
    }
    /* Settings Modal */
    #settingsModal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    #settingsModal.active {
      opacity: 1;
      visibility: visible;
    }

    .settings-panel {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      width: min(340px, 90%);
      color: #fff;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #settingsModal.active .settings-panel {
      transform: translateY(0);
    }

    .settings-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
    }

    .setting-row span {
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .toggle {
      width: 50px;
      height: 28px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toggle.active {
      background: #00a1e4;
    }

    .toggle.active::after {
      transform: translateX(22px);
    }

    .settings-close {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .settings-close:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Top Buttons Container */
    #topButtons {
      position: absolute;
      top: 45px;
      right: 20px;
      z-index: 50;
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.02);
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .icon-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    @media (pointer: coarse) {
      #topButtons {
        top: 120px;
      }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <!-- Hidden input for keyboard capture -->
  <input type="text" id="typingInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  
  <!-- HUD -->
  <div id="hud">
    <div class="hud-badge">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score">0</div>
    </div>
  </div>

  <!-- Typing Buffer Display -->
  <div id="bufferDisplay">
    <div class="buffer-container">
      <div class="buffer-label">Type Here</div>
      <div class="buffer-text">
        <span id="bufferText"></span><span class="buffer-cursor"></span>
      </div>
    </div>
  </div>

  <!-- Freeze Overlay -->
  <div id="freezeOverlay"></div>
  <div id="freezeTimer"></div>

  <!-- Combo Display -->
  <div id="comboDisplay"></div>

  <!-- Start Screen -->
  <div id="startScreen" class="overlay">
    <div class="start-bg-words">
      <div class="start-word" style="left: 10%; animation-duration: 6s; animation-delay: 0s;">SPEEDRUN</div>
      <div class="start-word special" style="left: 30%; animation-duration: 8s; animation-delay: 2s;">FALL</div>
      <div class="start-word" style="left: 55%; animation-duration: 7s; animation-delay: 1s;">TYPE</div>
      <div class="start-word special" style="left: 75%; animation-duration: 9s; animation-delay: 3s;">SPEED</div>
      <div class="start-word" style="left: 85%; animation-duration: 6s; animation-delay: 1.5s;">GAME</div>
      <div class="start-word" style="left: 20%; animation-duration: 10s; animation-delay: 4s;">QUICK</div>
      <div class="start-word" style="left: 65%; animation-duration: 7s; animation-delay: 5s;">WORDS</div>
      <div class="start-word special" style="left: 45%; animation-duration: 8s; animation-delay: 6s;">START</div>
      <div class="start-word" style="left: 5%; animation-duration: 9s; animation-delay: 7s;">OASIZ</div>
      <div class="start-word" style="left: 90%; animation-duration: 7s; animation-delay: 8s;">SCORE</div>
    </div>
    <div class="overlay-content">
      <h1 class="game-title">Word<span>fall</span></h1>
      <p class="game-subtitle">Type falling words before they stack up! Special words trigger powerful effects.</p>
      <button class="btn btn-primary" id="startButton">Start Game</button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="overlay-content">
      <h1 class="game-over-title">Game Over</h1>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Final Score</div>
          <div class="stat-value highlight" id="finalScore">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Words Cleared</div>
          <div class="stat-value" id="wordsCleared">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Best Combo</div>
          <div class="stat-value" id="bestCombo">0</div>
        </div>
      </div>
      <div class="buttons-row">
        <button class="btn btn-primary" id="restartButton">Play Again</button>
        <button class="btn btn-secondary" id="menuButton">Main Menu</button>
      </div>
    </div>
  </div>

  <!-- Top Buttons -->
  <div id="topButtons">
    <button class="icon-btn" id="settingsBtn" title="Settings">
      <svg viewBox="0 0 24 24">
        <path d="M19.43 12.98a7.79 7.79 0 0 0 0-1.96l2.11-1.65-2-3.46-2.49 1a7.72 7.72 0 0 0-1.69-.98L14.88 3h-4l-.48 2.93a7.72 7.72 0 0 0-1.69.98l-2.49-1-2 3.46 2.11 1.65a7.93 7.93 0 0 0 0 1.96L4.22 14.6l2 3.46 2.49-1c.52.4 1.08.72 1.69.98L10.88 21h4l.48-2.93a7.72 7.72 0 0 0 1.69-.98l2.49 1 2-3.46-2.1-1.65zM12.88 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/>
      </svg>
    </button>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal">
    <div class="settings-panel">
      <div class="settings-title">SETTINGS</div>
      <div class="setting-row">
        <span>Music</span>
        <div id="musicToggle" class="toggle active"></div>
      </div>
      <div class="setting-row">
        <span>SFX</span>
        <div id="fxToggle" class="toggle active"></div>
      </div>
      <div class="setting-row">
        <span>Haptics</span>
        <div id="hapticsToggle" class="toggle active"></div>
      </div>
      <button class="settings-close" id="settingsCloseBtn">Done</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
